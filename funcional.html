<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Funcional</title>
    <link rel="icon" href="Y.ico" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #FF9800;
            margin: 0 0 20px;
            text-align: center;
        }

        header {
            width: 100%;
            background-color: #111;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FF9800;
        }

        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-size: 0.95rem;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .nav a:hover {
            border-color: #FF9800;
        }

        .nav a.active {
            background-color: #FF9800;
            color: #000;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 1.3rem;
            margin: 28px 0 12px;
            color: #00bcd4;
        }

        .section-subtitle {
            color: #bbb;
            margin: 0 0 16px;
            font-size: 0.95rem;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .module-card,
        .attendant-card {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 14px;
            box-shadow: 0 0 0 1px rgba(255, 152, 0, 0.03);
        }

        .module-card h3,
        .attendant-card h3 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: #FF9800;
        }

        .module-card ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
            font-size: 0.95rem;
        }

        .module-card li + li {
            margin-top: 4px;
        }

        .module-card li::before {
            content: "- ";
            color: #00bcd4;
        }

        .attendants-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .attendant-card p {
            margin: 4px 0;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 8px;
            vertical-align: middle;
        }

        .tag-comercial {
            background-color: rgba(76, 175, 80, 0.15);
            color: #81c784;
            border: 1px solid rgba(129, 199, 132, 0.4);
        }

        .tag-sob-demanda {
            background-color: rgba(255, 152, 0, 0.12);
            color: #ffb74d;
            border: 1px solid rgba(255, 183, 77, 0.35);
        }

        .tag-alocado {
            background-color: rgba(3, 169, 244, 0.14);
            color: #4fc3f7;
            border: 1px solid rgba(79, 195, 247, 0.35);
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            color: #fff;
            border-top: 1px solid #333;
            font-size: 1.1em;
            --iframe-w: 180px;
            --iframe-h: 48px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 8px 12px;
            text-align: center;
        }

        #online-alarm-kur-iframe {
            width: var(--iframe-w);
            height: var(--iframe-h);
            border: 0;
            overflow: hidden;
        }

        .footer-spacer {
            width: var(--iframe-w);
            height: var(--iframe-h);
        }

        #countdown {
            font-weight: bold;
            color: #FF9800;
        }

        @media (max-width: 700px) {
            body {
                padding: 14px;
            }

            .header-inner {
                padding: 12px 14px;
            }
        }

        @media (max-width: 420px) {
            .footer {
                --iframe-w: 150px;
                --iframe-h: 42px;
            }

            .footer-grid {
                gap: 8px;
                font-size: 1em;
            }
        }
    </style>
</head>

    <h1>Mapa Funcional</h1>

        function getScheduleTagClass(schedule) {
            const value = schedule.toLowerCase();

            if (value.includes('comercial')) {
                return 'tag-comercial';
            }

            if (value.includes('alocado') || value.includes('alocacao')) {
                return 'tag-alocado';
            }

            return 'tag-sob-demanda';
        }

        function renderModules() {
            const container = document.getElementById('modulesGrid');

            modules.forEach(module => {
                const card = document.createElement('div');
                card.className = 'module-card';

                const title = document.createElement('h3');
                title.textContent = module.title;

                const list = document.createElement('ul');
                module.people.forEach(person => {
                    const item = document.createElement('li');
                    item.textContent = person;
                    list.appendChild(item);
                });

                card.appendChild(title);
                card.appendChild(list);
                container.appendChild(card);
            });
        }

        function renderAttendants() {
            const container = document.getElementById('attendantsList');

            attendants.forEach(attendant => {
                const card = document.createElement('div');
                card.className = 'attendant-card';

                const title = document.createElement('h3');
                title.textContent = `Atendente: ${attendant.name}`;

                const scheduleTag = document.createElement('span');
                scheduleTag.className = `tag ${getScheduleTagClass(attendant.schedule)}`;
                scheduleTag.textContent = attendant.schedule;
                title.appendChild(scheduleTag);

                const modulesText = document.createElement('p');
                modulesText.innerHTML = `<strong>Modulos:</strong> ${attendant.modules}`;

                const clientsText = document.createElement('p');
                clientsText.innerHTML = `<strong>Clientes para Atuacao:</strong> ${attendant.clients}`;

                const scheduleText = document.createElement('p');
                scheduleText.innerHTML = `<strong>Horario de Atuacao:</strong> ${attendant.schedule}`;

                card.appendChild(title);
                card.appendChild(modulesText);
                card.appendChild(clientsText);
                card.appendChild(scheduleText);
                container.appendChild(card);
            });
        }

        function updateCountdown() {
            const now = new Date();
            const target17h = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 0, 0);
            const target18h = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 18, 0, 0);
            const nextDay17h = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 17, 0, 0);

            let targetTime;
            let targetLabel;

            if (now < target17h) {
                targetTime = target17h;
                targetLabel = 'para as 17:00';
            } else if (now < target18h) {
                targetTime = target18h;
                targetLabel = 'para as 18:00 (Fim do Expediente)';
            } else {
                targetTime = nextDay17h;
                targetLabel = 'para 17:00 de amanha';
            }

            const diff = targetTime - now;
            const countdownElement = document.getElementById('countdown');
            if (!countdownElement) return;

            if (diff <= 0) {
                countdownElement.innerHTML = `<span style="color: #FF9800;">Objetivo atingido! Proxima contagem: ${targetLabel}.</span>`;
                return;
            }

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            countdownElement.innerHTML = `${targetLabel}: <span style="color: #FF9800;">${timeString}</span>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderModules();
            renderAttendants();
            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>
