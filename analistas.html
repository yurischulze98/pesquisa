        function carregarDados() {
            const dadosSalvos = localStorage.getItem('listaAnalistas');
            analistas = dadosSalvos ? JSON.parse(dadosSalvos) : [...dadosIniciais];
            if (!dadosSalvos) salvarNoStorage();
            renderizarTabela();
        }

        function renderizarTabela(dadosParaExibir = analistas) {
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = '';

            dadosParaExibir.forEach((analista) => {
                // Encontrar o index original para as funções de deletar/editar
                const indexOriginal = analistas.indexOf(analista);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${analista.nome}</td>
                    <td>${analista.torre}</td>
                    <td>${analista.funcao}</td>
                    <td>
                        <button class="btn-edit" onclick="prepararEdicao(${indexOriginal})">Editar</button>
                        <button class="btn-delete" onclick="removerAnalista(${indexOriginal})">Remover</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrarTabela() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = analistas.filter(a => 
                a.nome.toLowerCase().includes(termo) || 
                a.torre.toLowerCase().includes(termo) || 
                a.funcao.toLowerCase().includes(termo)
            );
            renderizarTabela(filtrados);
        }

        function salvarAnalista() {
            const nome = document.getElementById('nome').value.trim();
            const torre = document.getElementById('torre').value.trim();
            const funcao = document.getElementById('funcao').value.trim();
            const editIndex = parseInt(document.getElementById('edit-index').value);

            if (!nome || !torre || !funcao) return alert("Preencha todos os campos!");

            if (editIndex === -1) {
                analistas.push({ nome, torre, funcao });
            } else {
                analistas[editIndex] = { nome, torre, funcao };
                document.getElementById('edit-index').value = "-1";
                document.getElementById('btn-main').innerText = "Adicionar Analista";
            }

            limparCampos();
            salvarNoStorage();
            filtrarTabela(); // Atualiza a visualização respeitando a busca
        }

        function prepararEdicao(index) {
            const analista = analistas[index];
            document.getElementById('nome').value = analista.nome;
            document.getElementById('torre').value = analista.torre;
            document.getElementById('funcao').value = analista.funcao;
            document.getElementById('edit-index').value = index;
            document.getElementById('btn-main').innerText = "Salvar Alteração";
            document.getElementById('nome').focus();
        }

        function removerAnalista(index) {
            if (confirm(`Deseja realmente remover ${analistas[index].nome}?`)) {
                analistas.splice(index, 1);
                salvarNoStorage();
                filtrarTabela();
            }
        }

        function salvarNoStorage() {
            localStorage.setItem('listaAnalistas', JSON.stringify(analistas));
        }

        function limparCampos() {
            document.getElementById('nome').value = '';
            document.getElementById('torre').value = '';
            document.getElementById('funcao').value = '';
        }

        window.onload = carregarDados;
