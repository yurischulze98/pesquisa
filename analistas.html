<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analistas - Gestao</title>
    <link rel="icon" href="Y.ico" type="image/x-icon">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #FF9800; margin-bottom: 20px; }

        header {
            width: 100%;
            background-color: #111;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FF9800;
        }

        .nav {
            display: flex;
            gap: 10px;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-size: 0.95rem;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .nav a:hover {
            border-color: #FF9800;
        }

        .nav a.active {
            background-color: #FF9800;
            color: #000;
        }

        .search-container,
        .table-container,
        .status-box,
        .form-container {
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        .search-container { margin-bottom: 15px; }

        .search-container input {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 1px solid #FF9800;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .table-container {
            background-color: #111;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; }
        th { background-color: #222; color: #FF9800; }

        .btn-edit,
        .btn-delete {
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-edit { background-color: #2196F3; }
        .btn-delete { background-color: #f44336; }
        .btn-edit:hover { background-color: #0b7dda; }
        .btn-delete:hover { background-color: #da190b; }

        .form-container {
            background-color: #111;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            border: 1px solid #333;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 10px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }

        #btn-main {
            padding: 10px 20px;
            background-color: #FF9800;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            height: 40px;
        }

        .status-box {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
        }

        .status-ok {
            display: block;
            background-color: rgba(46, 125, 50, 0.2);
            border: 1px solid #2e7d32;
            color: #a5d6a7;
        }

        .status-error {
            display: block;
            background-color: rgba(198, 40, 40, 0.2);
            border: 1px solid #c62828;
            color: #ef9a9a;
        }

        .form-hint {
            width: 100%;
            color: #9e9e9e;
            font-size: 0.9rem;
            margin-top: -5px;
        }

        @media (max-width: 700px) {
            .header-inner {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">Localizar Chamados</div>
            <nav class="nav">
                <a href="index.html">Pesquisa</a>
                <a href="funcional.html">Funcional</a>
                <a href="nomes.html">Nomes</a>
                <a href="informacoes.html">Informacoes</a>
                <a href="analistas.html" class="active">Analistas</a>
            </nav>
        </div>
    </header>

    <h1>Planilha de Analistas</h1>

    <div id="status" class="status-box"></div>

    <div class="search-container">
        <input
            type="text"
            id="inputBusca"
            placeholder="Buscar por nome, torre ou funcao..."
            onkeyup="filtrarTabela()"
        >
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nome do Analista</th>
                    <th>Torre</th>
                    <th>Funcao</th>
                    <th style="width: 150px;">Acoes</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <div class="form-container">
        <input type="hidden" id="edit-id" value="">

        <div class="form-group">
            <label>Nome do Analista</label>
            <input type="text" id="nome">
        </div>

        <div class="form-group">
            <label>Torre (Equipe)</label>
            <input type="text" id="torre">
        </div>

        <div class="form-group">
            <label>Funcao (Cargo)</label>
            <input type="text" id="funcao">
        </div>

        <div class="form-group">
            <label>Token admin (opcional)</label>
            <input type="password" id="admin-token" placeholder="Use apenas se configurar ADMIN_TOKEN na Vercel">
        </div>

        <button id="btn-main" onclick="salvarAnalista()">Adicionar Analista</button>
        <div class="form-hint">Se voce configurar a variavel ADMIN_TOKEN na Vercel, sera preciso informar esse token para adicionar, editar e remover.</div>
    </div>

    <script>
        let analistas = [];

        function mostrarStatus(mensagem, tipo = "ok") {
            const status = document.getElementById("status");
            status.textContent = mensagem;
            status.className = "status-box " + (tipo === "ok" ? "status-ok" : "status-error");
        }

        function limparStatus() {
            const status = document.getElementById("status");
            status.textContent = "";
            status.className = "status-box";
        }

        function obterAdminToken() {
            return document.getElementById("admin-token").value.trim();
        }

        function montarHeadersJson() {
            const headers = { "Content-Type": "application/json" };
            const adminToken = obterAdminToken();

            if (adminToken) {
                headers["x-admin-token"] = adminToken;
            }

            return headers;
        }

        async function parseJsonSegura(resposta) {
            const texto = await resposta.text();

            try {
                return texto ? JSON.parse(texto) : {};
            } catch (erro) {
                console.error("Resposta invalida:", texto);
                throw new Error("A API retornou uma resposta invalida.");
            }
        }

        async function carregarDados() {
            try {
                const resposta = await fetch("/api/listar-analistas", { cache: "no-store" });
                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok) {
                    throw new Error(resultado.mensagem || "Falha ao carregar os analistas.");
                }

                analistas = Array.isArray(resultado.analistas) ? resultado.analistas : [];
                filtrarTabela();
            } catch (erro) {
                console.error(erro);
                mostrarStatus(erro.message || "Erro ao carregar os analistas.", "error");
            }
        }

        function renderizarTabela(dadosParaExibir = analistas) {
            const tbody = document.getElementById("tabela-corpo");
            tbody.innerHTML = "";

            if (!dadosParaExibir.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4">Nenhum analista encontrado.</td>
                    </tr>
                `;
                return;
            }

            dadosParaExibir.forEach((analista) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${escaparHtml(analista.nome)}</td>
                    <td>${escaparHtml(analista.torre)}</td>
                    <td>${escaparHtml(analista.funcao)}</td>
                    <td>
                        <button class="btn-edit" onclick="prepararEdicao(${analista.id})">Editar</button>
                        <button class="btn-delete" onclick="removerAnalista(${analista.id})">Remover</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrarTabela() {
            const termo = document.getElementById("inputBusca").value.toLowerCase();

            const filtrados = analistas.filter((analista) =>
                analista.nome.toLowerCase().includes(termo) ||
                analista.torre.toLowerCase().includes(termo) ||
                analista.funcao.toLowerCase().includes(termo)
            );

            renderizarTabela(filtrados);
        }

        async function salvarAnalista() {
            limparStatus();

            const id = document.getElementById("edit-id").value;
            const nome = document.getElementById("nome").value.trim();
            const torre = document.getElementById("torre").value.trim();
            const funcao = document.getElementById("funcao").value.trim();

            if (!nome || !torre || !funcao) {
                mostrarStatus("Preencha todos os campos.", "error");
                return;
            }

            const url = id ? "/api/editar-analista" : "/api/salvar-analista";
            const payload = id
                ? { id: Number(id), nome, torre, funcao }
                : { nome, torre, funcao };

            try {
                const resposta = await fetch(url, {
                    method: "POST",
                    headers: montarHeadersJson(),
                    body: JSON.stringify(payload)
                });

                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Nao foi possivel salvar.");
                }

                limparCampos();
                limparModoEdicao();
                await carregarDados();
                mostrarStatus(resultado.mensagem || "Analista salvo com sucesso.");
            } catch (erro) {
                console.error(erro);
                mostrarStatus(erro.message || "Erro ao salvar analista.", "error");
            }
        }

        function prepararEdicao(id) {
            const analista = analistas.find((item) => item.id === id);

            if (!analista) {
                mostrarStatus("Analista nao encontrado para edicao.", "error");
                return;
            }

            document.getElementById("nome").value = analista.nome;
            document.getElementById("torre").value = analista.torre;
            document.getElementById("funcao").value = analista.funcao;
            document.getElementById("edit-id").value = analista.id;
            document.getElementById("btn-main").innerText = "Salvar Alteracao";
            document.getElementById("nome").focus();
        }

        async function removerAnalista(id) {
            const analista = analistas.find((item) => item.id === id);

            if (!analista) {
                mostrarStatus("Analista nao encontrado para remocao.", "error");
                return;
            }

            const confirmou = confirm(`Deseja realmente remover ${analista.nome}?`);
            if (!confirmou) return;

            try {
                const resposta = await fetch("/api/remover-analista", {
                    method: "POST",
                    headers: montarHeadersJson(),
                    body: JSON.stringify({ id })
                });

                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Nao foi possivel remover.");
                }

                if (String(document.getElementById("edit-id").value) === String(id)) {
                    limparCampos();
                    limparModoEdicao();
                }

                await carregarDados();
                mostrarStatus(resultado.mensagem || "Analista removido com sucesso.");
            } catch (erro) {
                console.error(erro);
                mostrarStatus(erro.message || "Erro ao remover analista.", "error");
            }
        }

        function limparCampos() {
            document.getElementById("nome").value = "";
            document.getElementById("torre").value = "";
            document.getElementById("funcao").value = "";
        }

        function limparModoEdicao() {
            document.getElementById("edit-id").value = "";
            document.getElementById("btn-main").innerText = "Adicionar Analista";
        }

        function escaparHtml(valor) {
            return String(valor)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
