<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analistas - Gestao</title>
    <link rel="icon" href="Y.ico" type="image/x-icon">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #FF9800; margin-bottom: 20px; }

        header { width: 100%; background-color: #111; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .header-inner { max-width: 1100px; margin: 0 auto; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #FF9800; }
        .nav { display: flex; gap: 15px; flex-wrap: wrap; }
        .nav a { color: #ccc; text-decoration: none; padding: 8px 12px; border-radius: 4px; transition: 0.2s; }
        .nav a:hover { background-color: #333; color: #fff; }
        .nav a.active { background-color: #FF9800; color: #000; font-weight: bold; }

        .search-container,
        .table-container,
        .status-box,
        .form-shell {
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        .search-container { margin-bottom: 15px; }

        .search-container input {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 1px solid #FF9800;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .table-container {
            background-color: #111;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; }
        th { background-color: #222; color: #FF9800; }

        .btn-edit,
        .btn-delete {
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-edit { background-color: #2196F3; }
        .btn-delete { background-color: #f44336; }
        .btn-edit:hover { background-color: #0b7dda; }
        .btn-delete:hover { background-color: #da190b; }

        .status-box {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
        }

        .status-ok {
            display: block;
            background-color: rgba(46, 125, 50, 0.2);
            border: 1px solid #2e7d32;
            color: #a5d6a7;
        }

        .status-error {
            display: block;
            background-color: rgba(198, 40, 40, 0.2);
            border: 1px solid #c62828;
            color: #ef9a9a;
        }

        .form-shell {
            background-color: #111;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .form-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #FF9800;
        }

        .edit-badge {
            display: none;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: rgba(33, 150, 243, 0.16);
            border: 1px solid #2196F3;
            color: #90caf9;
            font-size: 0.9rem;
        }

        .edit-badge.active {
            display: inline-flex;
        }

        .form-container {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 10px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            height: 42px;
        }

        .custom-select {
            position: relative;
        }

        .custom-select-trigger {
            width: 100%;
            height: 42px;
            padding: 10px 38px 10px 10px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            text-align: left;
            cursor: pointer;
            position: relative;
        }

        .custom-select-trigger::after {
            content: "▾";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .custom-select.open .custom-select-trigger {
            border-color: #FF9800;
        }

        .custom-select-options {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
            max-height: 210px;
            overflow-y: auto;
            display: none;
            z-index: 30;
        }

        .custom-select.open .custom-select-options {
            display: block;
        }

        .custom-select-option {
            width: 100%;
            display: block;
            padding: 10px 12px;
            cursor: pointer;
            border: none;
            border-bottom: 1px solid #2c2c2c;
            background: transparent;
            color: #fff;
            text-align: left;
            font: inherit;
        }

        .custom-select-option:last-child {
            border-bottom: none;
        }

        .custom-select-option:hover,
        .custom-select-option.active {
            background-color: #2b2b2b;
            color: #FF9800;
        }

        .torre-toggle-wrap {
            width: 100%;
            margin-top: 14px;
        }

        .torre-actions {
            display: none;
            gap: 10px;
            width: 100%;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2d2d2d;
        }

        .torre-actions.visible {
            display: flex;
        }

        .torre-actions .form-group {
            min-width: 240px;
        }

        .btn-primary,
        .btn-secondary,
        .btn-inline,
        .btn-toggle {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            height: 42px;
        }

        .btn-primary {
            background-color: #FF9800;
            color: #000;
        }

        .btn-secondary {
            background-color: #333;
            color: #fff;
            display: none;
        }

        .btn-secondary.visible {
            display: inline-block;
        }

        .btn-inline {
            background-color: #4CAF50;
            color: #fff;
            min-width: 150px;
        }

        .btn-toggle {
            background-color: #2b2b2b;
            color: #fff;
            border: 1px solid #444;
        }

        .small-text {
            color: #9e9e9e;
            font-size: 0.88rem;
        }

        @media (max-width: 700px) {
            .header-inner {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .form-header {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">Localizar Chamados</div>
            <nav class="nav">
                <a href="index.html">Pesquisa</a>
                <a href="funcional.html">Funcional</a>
                <a href="nomes.html">Nomes</a>
                <a href="informacoes.html">Informacoes</a>
                <a href="analistas.html" class="active">Analistas</a>
            </nav>
        </div>
    </header>

    <h1>Planilha de Analistas</h1>

    <div class="search-container">
        <input
            type="text"
            id="inputBusca"
            placeholder="Buscar por nome, torre ou funcao..."
            onkeyup="filtrarTabela()"
        >
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nome do Analista</th>
                    <th>Torre</th>
                    <th>Funcao</th>
                    <th style="width: 150px;">Acoes</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <div id="status" class="status-box"></div>

    <div class="form-shell">
        <div class="form-header">
            <div>
                <div class="form-title" id="form-title">Adicionar analista</div>
                <div class="small-text">Preencha os campos abaixo para incluir ou editar um registro.</div>
            </div>
            <div id="edit-badge" class="edit-badge">Modo de edicao</div>
        </div>

        <div class="form-container">
            <input type="hidden" id="edit-id" value="">

            <div class="form-group">
                <label>Nome do Analista</label>
                <input type="text" id="nome">
            </div>

            <div class="form-group">
                <label>Torre (Equipe)</label>
                <input type="hidden" id="torre">
                <div class="custom-select" id="torre-select">
                    <button type="button" class="custom-select-trigger" id="torre-trigger" onclick="toggleDropdownTorre()">
                        Selecione uma torre
                    </button>
                    <div class="custom-select-options" id="torre-options"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Funcao (Cargo)</label>
                <input type="text" id="funcao">
            </div>

            <div class="form-group">
                <label>Token admin</label>
                <input type="password" id="admin-token" placeholder="Informe apenas se usar protecao por token">
            </div>

            <button id="btn-main" class="btn-primary" onclick="salvarAnalista()">Adicionar Analista</button>
            <button id="btn-cancelar" class="btn-secondary" onclick="cancelarEdicao()">Cancelar</button>
        </div>

        <div class="torre-toggle-wrap">
            <button id="btn-toggle-torre" class="btn-toggle" onclick="toggleNovaTorre()">+ Adicionar nova torre</button>
        </div>

        <div id="torre-actions" class="torre-actions">
            <div class="form-group">
                <label>Adicionar nova torre</label>
                <input type="text" id="nova-torre" placeholder="Ex.: Cloud, Aplicacao, Banco...">
            </div>
            <button class="btn-inline" onclick="salvarTorre()">Salvar Torre</button>
            <button class="btn-secondary visible" type="button" onclick="fecharNovaTorre()">Cancelar</button>
        </div>
    </div>

    <script>
        let analistas = [];
        let torres = [];

        function mostrarStatus(mensagem, tipo = "ok") {
            const status = document.getElementById("status");
            status.textContent = mensagem;
            status.className = "status-box " + (tipo === "ok" ? "status-ok" : "status-error");
        }

        function limparStatus() {
            const status = document.getElementById("status");
            status.textContent = "";
            status.className = "status-box";
        }

        function obterAdminToken() {
            return document.getElementById("admin-token").value.trim();
        }

        function montarHeadersJson() {
            const headers = { "Content-Type": "application/json" };
            const adminToken = obterAdminToken();

            if (adminToken) {
                headers["x-admin-token"] = adminToken;
            }

            return headers;
        }

        async function parseJsonSegura(resposta) {
            const texto = await resposta.text();

            try {
                return texto ? JSON.parse(texto) : {};
            } catch {
                return { sucesso: false, mensagem: texto || "Resposta invalida da API." };
            }
        }

        function escapeHtml(valor) {
            return String(valor ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderizarTabela(lista = analistas) {
            const corpo = document.getElementById("tabela-corpo");

            if (!lista.length) {
                corpo.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align:center; color:#aaa;">Nenhum analista encontrado.</td>
                    </tr>
                `;
                return;
            }

            corpo.innerHTML = lista.map(item => `
                <tr>
                    <td>${escapeHtml(item.nome)}</td>
                    <td>${escapeHtml(item.torre)}</td>
                    <td>${escapeHtml(item.funcao)}</td>
                    <td>
                        <button class="btn-edit" onclick="editarAnalista(${item.id})">Editar</button>
                        <button class="btn-delete" onclick="removerAnalista(${item.id})">Excluir</button>
                    </td>
                </tr>
            `).join("");
        }

        function expandirSelectTorre() {
            const select = document.getElementById("torre");
            const totalOpcoes = select.options.length;
            const visiveis = Math.min(Math.max(totalOpcoes, 2), 6);

            select.size = visiveis;
            select.classList.add("expanded");
        }

        function recolherSelectTorre() {
            const select = document.getElementById("torre");
            select.size = 1;
            select.classList.remove("expanded");
        }

        function fecharDropdownTorre() {
            document.getElementById("torre-select").classList.remove("open");
        }

        function toggleDropdownTorre() {
            document.getElementById("torre-select").classList.toggle("open");
        }

        function selecionarTorre(valor) {
            document.getElementById("torre").value = valor;
            document.getElementById("torre-trigger").textContent = valor || "Selecione uma torre";
            fecharDropdownTorre();
        }

        function renderizarSelectTorres(valorSelecionado = "") {
            const input = document.getElementById("torre");
            const options = document.getElementById("torre-options");
            const trigger = document.getElementById("torre-trigger");
            const valorAtual = valorSelecionado || input.value || "";

            input.value = valorAtual;
            trigger.textContent = valorAtual || "Selecione uma torre";

            const itens = [
                `<div class="custom-select-option${!valorAtual ? ' active' : ''}" data-value="">Selecione uma torre</div>`
            ];

            torres.forEach(item => {
                const nomeTorre = String(item.nome || "");
                const ativo = nomeTorre === valorAtual ? ' active' : '';
                itens.push(
                    `<div class="custom-select-option${ativo}" data-value="${escapeHtml(nomeTorre)}">${escapeHtml(nomeTorre)}</div>`
                );
            });

            if (valorAtual && !torres.some(item => item.nome === valorAtual)) {
                itens.push(
                    `<div class="custom-select-option active" data-value="${escapeHtml(valorAtual)}">${escapeHtml(valorAtual)}</div>`
                );
            }

            options.innerHTML = itens.join("");
        }

        async function carregarTorres(valorSelecionado = "") {
            try {
                const resposta = await fetch("/api/listar-torres");
                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Nao foi possivel carregar as torres.");
                }

                torres = Array.isArray(resultado.torres) ? resultado.torres : [];
                renderizarSelectTorres(valorSelecionado);
            } catch (erro) {
                renderizarSelectTorres(valorSelecionado);
                mostrarStatus(erro.message || "Erro ao carregar as torres.", "error");
            }
        }

        async function carregarDados() {
            try {
                const resposta = await fetch("/api/listar-analistas");
                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Nao foi possivel carregar os analistas.");
                }

                analistas = Array.isArray(resultado.analistas) ? resultado.analistas : [];
                renderizarTabela();
            } catch (erro) {
                analistas = [];
                renderizarTabela();
                mostrarStatus(erro.message || "Erro ao carregar os analistas.", "error");
            }
        }

        function filtrarTabela() {
            const termo = document.getElementById("inputBusca").value.toLowerCase().trim();

            if (!termo) {
                renderizarTabela();
                return;
            }

            const filtrada = analistas.filter(item =>
                String(item.nome).toLowerCase().includes(termo) ||
                String(item.torre).toLowerCase().includes(termo) ||
                String(item.funcao).toLowerCase().includes(termo)
            );

            renderizarTabela(filtrada);
        }

        function toggleNovaTorre() {
            const area = document.getElementById("torre-actions");
            const input = document.getElementById("nova-torre");
            const botao = document.getElementById("btn-toggle-torre");
            const visivel = area.classList.toggle("visible");

            botao.textContent = visivel ? "Ocultar nova torre" : "+ Adicionar nova torre";

            if (visivel) {
                input.focus();
            } else {
                input.value = "";
            }
        }

        function fecharNovaTorre() {
            const area = document.getElementById("torre-actions");
            const input = document.getElementById("nova-torre");
            const botao = document.getElementById("btn-toggle-torre");

            area.classList.remove("visible");
            input.value = "";
            botao.textContent = "+ Adicionar nova torre";
        }

        function entrarModoEdicao(item) {
            document.getElementById("edit-id").value = item.id;
            document.getElementById("nome").value = item.nome;
            document.getElementById("funcao").value = item.funcao;
            document.getElementById("form-title").textContent = "Editar analista";
            document.getElementById("btn-main").textContent = "Salvar Edicao";
            document.getElementById("btn-cancelar").classList.add("visible");
            document.getElementById("edit-badge").classList.add("active");
            renderizarSelectTorres(item.torre);
            fecharDropdownTorre();
            document.getElementById("nome").focus();
            limparStatus();
        }

        function cancelarEdicao() {
            document.getElementById("edit-id").value = "";
            document.getElementById("nome").value = "";
            document.getElementById("funcao").value = "";
            document.getElementById("nova-torre").value = "";
            document.getElementById("form-title").textContent = "Adicionar analista";
            document.getElementById("btn-main").textContent = "Adicionar Analista";
            document.getElementById("btn-cancelar").classList.remove("visible");
            document.getElementById("edit-badge").classList.remove("active");
            renderizarSelectTorres();
            fecharDropdownTorre();
            limparStatus();
        }

        async function editarAnalista(id) {
            const item = analistas.find(analista => Number(analista.id) === Number(id));

            if (!item) {
                mostrarStatus("Analista nao encontrado para edicao.", "error");
                return;
            }

            entrarModoEdicao(item);
        }

        async function salvarAnalista() {
            const id = document.getElementById("edit-id").value.trim();
            const nome = document.getElementById("nome").value.trim();
            const torre = document.getElementById("torre").value.trim();
            const funcao = document.getElementById("funcao").value.trim();

            if (!nome || !torre || !funcao) {
                mostrarStatus("Preencha nome, torre e funcao.", "error");
                return;
            }

            const emEdicao = Boolean(id);
            const url = emEdicao ? "/api/editar-analista" : "/api/salvar-analista";
            const payload = emEdicao ? { id: Number(id), nome, torre, funcao } : { nome, torre, funcao };

            try {
                const resposta = await fetch(url, {
                    method: "POST",
                    headers: montarHeadersJson(),
                    body: JSON.stringify(payload)
                });

                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Falha ao salvar o analista.");
                }

                mostrarStatus(resultado.mensagem || (emEdicao ? "Analista atualizado com sucesso." : "Analista salvo com sucesso."), "ok");
                cancelarEdicao();
                await carregarDados();
            } catch (erro) {
                mostrarStatus(erro.message || "Erro ao salvar o analista.", "error");
            }
        }

        async function removerAnalista(id) {
            const confirmado = confirm("Deseja realmente excluir este analista?");

            if (!confirmado) {
                return;
            }

            try {
                const resposta = await fetch("/api/remover-analista", {
                    method: "POST",
                    headers: montarHeadersJson(),
                    body: JSON.stringify({ id })
                });

                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Falha ao remover o analista.");
                }

                mostrarStatus(resultado.mensagem || "Analista removido com sucesso.", "ok");
                await carregarDados();

                const editId = document.getElementById("edit-id").value.trim();
                if (editId && Number(editId) === Number(id)) {
                    cancelarEdicao();
                }
            } catch (erro) {
                mostrarStatus(erro.message || "Erro ao remover o analista.", "error");
            }
        }

        async function salvarTorre() {
            const nome = document.getElementById("nova-torre").value.trim();

            if (!nome) {
                mostrarStatus("Informe o nome da nova torre.", "error");
                return;
            }

            try {
                const resposta = await fetch("/api/salvar-torre", {
                    method: "POST",
                    headers: montarHeadersJson(),
                    body: JSON.stringify({ nome })
                });

                const resultado = await parseJsonSegura(resposta);

                if (!resposta.ok || !resultado.sucesso) {
                    throw new Error(resultado.mensagem || "Falha ao salvar a torre.");
                }

                document.getElementById("nova-torre").value = "";
                await carregarTorres(resultado.torre?.nome || nome);
                fecharNovaTorre();
                mostrarStatus(resultado.mensagem || "Torre salva com sucesso.", "ok");
            } catch (erro) {
                mostrarStatus(erro.message || "Erro ao salvar a torre.", "error");
            }
        }


        document.getElementById("torre-options").addEventListener("click", function(evento) {
            const opcao = evento.target.closest(".custom-select-option");

            if (!opcao) {
                return;
            }

            selecionarTorre(opcao.dataset.value || "");
        });

        document.addEventListener("click", function(evento) {
            const container = document.getElementById("torre-select");
            if (container && !container.contains(evento.target)) {
                fecharDropdownTorre();
            }
        });

        async function inicializarPagina() {
            await carregarTorres();
            await carregarDados();
        }

        inicializarPagina();
    </script>
</body>
</html>
